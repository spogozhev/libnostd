name: Build & Test

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check scripts with shellcheck
        run: shellcheck -a -C --shell sh scripts/*.sh

      - name: Build source code
        run: |
          ./scripts/build.sh
        timeout-minutes: 10
